version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Copenhagen"
    groups:
      astro-svelte:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "svelte"
          - "svelte-*"
          - "@sveltejs/*"
      app-dependencies:
        dependency-type: "production"
        exclude-patterns:
          - "astro"
          - "@astrojs/*"
          - "svelte"
          - "svelte-*"
          - "@sveltejs/*"
      dev-dependencies:
        dependency-type: "development"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
